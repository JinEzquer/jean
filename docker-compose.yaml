services:
  mysql:
    image: mysql:8.0 
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: my
      MYSQL_USER: PATRICKSCOLDCUTS
      MYSQL_PASSWORD: 123456
    ports:
    - "3306:3306"
    volumes:
    - mysql_data:/var/lib/mysql
    networks:
    - mynetwork
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
     PMA_HOST: mysql
     PMA_USER: PATRICKSCOLDCUTS
     PMA_PASSWORD: 123456
    ports:
    - "8080:80"
    depends_on:
    - mysql
    networks:
    - mynetwork
volumes:
  mysql_data:
networks:
  mynetwork:
    driver: bridge